<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1C2B2D" />
<title>Atmabodh · prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{margin:0;padding:0;background:#D9DED9;}
  #root{min-height:100vh;}
  .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:Inter,sans-serif;color:#5E847B;font-size:15px;}
</style>
</head>
<body>
<div id="root"><div class="loading">Loading Atmabodh…</div></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;


/* ============================================================
   ATMABODH — interactive prototype
   One engine, three doors. Calm-first register, spark on entry
   into SelfQuest / CareerCompass. Crisis escalation is a hard,
   non-negotiable branch off the formulation engine.
   ============================================================ */

const T = {
  ink: "#1C2B2D",
  inkSoft: "#4A5A5B",
  mist: "#E8EDE9",
  sage: "#7BA098",
  sageDeep: "#5E847B",
  clay: "#E5B299",
  spark: "#F2A65A",
  sparkDeep: "#D98A3A",
  paper: "#FBFAF6",
  alert: "#C0594B",
};

const FONT_DISPLAY =
  '"Fraunces", "Times New Roman", Georgia, serif';
const FONT_BODY =
  '"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';

/* ---------- Breathing / momentum arc (the signature element) ---------- */
function Arc({ progress = 0, register = "calm", size = 168, label, sub }) {
  const stroke = 10;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const dash = c * (1 - progress);
  const color = register === "spark" ? T.spark : T.sage;

  return (
    <div
      style={{
        position: "relative",
        width: size,
        height: size,
        margin: "0 auto",
      }}
      className={register === "calm" ? "breathe" : ""}
    >
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle
          cx={size / 2}
          cy={size / 2}
          r={r}
          fill="none"
          stroke={register === "spark" ? "#F6E2CC" : "#D5E0DA"}
          strokeWidth={stroke}
        />
        <circle
          cx={size / 2}
          cy={size / 2}
          r={r}
          fill="none"
          stroke={color}
          strokeWidth={stroke}
          strokeLinecap="round"
          strokeDasharray={c}
          strokeDashoffset={dash}
          style={{ transition: "stroke-dashoffset 900ms cubic-bezier(.2,.8,.2,1)" }}
        />
      </svg>
      <div
        style={{
          position: "absolute",
          inset: 0,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
        }}
      >
        <div
          style={{
            fontFamily: FONT_DISPLAY,
            fontSize: 40,
            fontWeight: 500,
            color: T.ink,
            lineHeight: 1,
            fontVariantNumeric: "tabular-nums",
          }}
        >
          {label}
        </div>
        {sub && (
          <div
            style={{
              fontFamily: FONT_BODY,
              fontSize: 12,
              letterSpacing: ".06em",
              color: T.inkSoft,
              marginTop: 6,
              textTransform: "uppercase",
            }}
          >
            {sub}
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------- Small UI atoms ---------- */
const Btn = ({ children, onClick, variant = "primary", register = "calm", style, disabled = false }) => {
  const accent = register === "spark" ? T.sparkDeep : T.sageDeep;
  const base = {
    fontFamily: FONT_BODY,
    fontSize: 16,
    fontWeight: 600,
    border: "none",
    borderRadius: 16,
    padding: "16px 22px",
    cursor: disabled ? "not-allowed" : "pointer",
    width: "100%",
    opacity: disabled ? 0.45 : 1,
    transition: "transform .15s ease, background .2s ease, opacity .2s ease",
  };
  const variants = {
    primary: { background: accent, color: T.paper },
    ghost: { background: "transparent", color: accent, border: `1.5px solid ${accent}` },
    quiet: { background: "transparent", color: T.inkSoft, fontWeight: 500 },
  };
  return (
    <button
      onClick={disabled ? undefined : onClick}
      disabled={disabled}
      style={{ ...base, ...variants[variant], ...style }}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = "scale(.98)")}
      onMouseUp={(e) => (e.currentTarget.style.transform = "scale(1)")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "scale(1)")}
    >
      {children}
    </button>
  );
};

const Eyebrow = ({ children, register = "calm" }) => (
  <div
    style={{
      fontFamily: FONT_BODY,
      fontSize: 12,
      fontWeight: 600,
      letterSpacing: ".14em",
      textTransform: "uppercase",
      color: register === "spark" ? T.sparkDeep : T.sageDeep,
      marginBottom: 12,
    }}
  >
    {children}
  </div>
);

const H = ({ children, size = 30 }) => (
  <h1
    style={{
      fontFamily: FONT_DISPLAY,
      fontWeight: 500,
      fontSize: size,
      lineHeight: 1.1,
      color: T.ink,
      margin: "0 0 14px",
      letterSpacing: "-.01em",
    }}
  >
    {children}
  </h1>
);

const P = ({ children, style }) => (
  <p
    style={{
      fontFamily: FONT_BODY,
      fontSize: 15.5,
      lineHeight: 1.55,
      color: T.inkSoft,
      margin: "0 0 16px",
      ...style,
    }}
  >
    {children}
  </p>
);

/* ============================================================
   SCREENS
   ============================================================ */

const SCREENS = [
  "welcome",
  "intent",
  "checkin",
  "listen",
  "formulating",
  "triage",
  "reframe",
  "values",
  "selfquest_intro",
  "selfquest_level",
  "resultcard",
  "career",
  "microexp",
  "home",
  "crisis",
];

function Atmabodh() {
  const [screen, setScreen] = useState("welcome");
  const [counter, setCounter] = useState(0); // never-breaking progress
  const [xp, setXp] = useState(0);
  const [feeling, setFeeling] = useState(null);
  const [thought, setThought] = useState("");
  const [history, setHistory] = useState([]);

  const go = (next) => {
    setHistory((h) => [...h, screen]);
    setScreen(next);
  };
  const back = () => {
    setHistory((h) => {
      if (!h.length) return h;
      const prev = h[h.length - 1];
      setScreen(prev);
      return h.slice(0, -1);
    });
  };

  const register =
    ["selfquest_intro", "selfquest_level", "resultcard", "career", "microexp"].includes(
      screen
    )
      ? "spark"
      : "calm";

  const bg = register === "spark" ? "#FCF3E8" : T.mist;

  return (
    <div
      style={{
        minHeight: "100vh",
        background: "#D9DED9",
        display: "flex",
        justifyContent: "center",
        alignItems: "center",
        fontFamily: FONT_BODY,
        padding: 24,
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');
        @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
        .breathe { animation: breathe 5.5s ease-in-out infinite; }
        @keyframes fadeUp { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }
        .fade { animation: fadeUp .5s ease both; }
        @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
        .pulse { animation: pulse 1.4s ease-in-out infinite; }
        @media (prefers-reduced-motion: reduce){
          .breathe,.fade,.pulse{animation:none !important}
        }
        button:focus-visible{ outline:3px solid ${T.ink}; outline-offset:2px; }
        *::-webkit-scrollbar{width:0}
      `}</style>

      {/* phone shell */}
      <div
        style={{
          width: 390,
          height: 800,
          background: bg,
          borderRadius: 44,
          boxShadow: "0 30px 80px rgba(28,43,45,.28)",
          overflow: "hidden",
          position: "relative",
          transition: "background 900ms ease",
          border: "1px solid rgba(255,255,255,.5)",
        }}
      >
        {/* status / nav bar */}
        <div
          style={{
            height: 54,
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            padding: "0 22px",
          }}
        >
          {history.length > 0 && screen !== "welcome" ? (
            <button
              onClick={back}
              style={{
                background: "none",
                border: "none",
                cursor: "pointer",
                color: T.inkSoft,
                fontSize: 22,
                padding: 4,
              }}
              aria-label="Back"
            >
              ←
            </button>
          ) : (
            <span style={{ width: 22 }} />
          )}
          <span
            style={{
              fontFamily: FONT_DISPLAY,
              fontSize: 15,
              fontWeight: 600,
              letterSpacing: ".02em",
              color: T.ink,
            }}
          >
            Atmabodh
          </span>
          <span style={{ width: 22 }} />
        </div>

        {/* screen body */}
        <div
          key={screen}
          className="fade"
          style={{
            height: 746,
            overflowY: "auto",
            padding: "8px 26px 26px",
            display: "flex",
            flexDirection: "column",
          }}
        >
          {screen === "welcome" && <Welcome go={go} />}
          {screen === "intent" && <Intent go={go} />}
          {screen === "checkin" && (
            <Checkin go={go} feeling={feeling} setFeeling={setFeeling} />
          )}
          {screen === "listen" && (
            <Listen go={go} thought={thought} setThought={setThought} />
          )}
          {screen === "formulating" && <Formulating go={go} />}
          {screen === "triage" && <Triage go={go} />}
          {screen === "reframe" && (
            <Reframe go={go} counter={counter} setCounter={setCounter} />
          )}
          {screen === "values" && <Values go={go} />}
          {screen === "selfquest_intro" && <SelfQuestIntro go={go} />}
          {screen === "selfquest_level" && (
            <SelfQuestLevel go={go} xp={xp} setXp={setXp} />
          )}
          {screen === "resultcard" && <ResultCard go={go} />}
          {screen === "career" && <Career go={go} />}
          {screen === "microexp" && <MicroExp go={go} setCounter={setCounter} />}
          {screen === "home" && (
            <Home go={go} counter={counter} xp={xp} />
          )}
          {screen === "crisis" && <Crisis go={go} />}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Welcome ---------------- */
function Welcome({ go }) {
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
      <div style={{ marginBottom: 40 }}>
        <Arc progress={0.62} register="calm" label="" sub="" size={150} />
      </div>
      <Eyebrow>आत्मबोध · self-knowledge</Eyebrow>
      <H size={34}>Not advice. A clearer view of what you already feel.</H>
      <P>
        A few quiet minutes a day. We help you tell apart what’s really going on
        from the noise around it — your mind, your sense of self, and what’s next.
      </P>
      <div style={{ marginTop: "auto", display: "grid", gap: 12 }}>
        <Btn onClick={() => go("intent")}>Begin</Btn>
        <Btn variant="quiet" onClick={() => go("home")}>
          I’ve been here before
        </Btn>
      </div>
    </div>
  );
}

/* ---------------- Intent picker (three doors) ---------------- */
function Intent({ go }) {
  const doors = [
    {
      k: "MindSpace",
      d: "When today feels heavy or loud.",
      hue: T.sage,
      reg: "calm",
      to: "checkin",
    },
    {
      k: "SelfQuest",
      d: "Figure out who you actually are.",
      hue: T.spark,
      reg: "spark",
      to: "selfquest_intro",
    },
    {
      k: "CareerCompass",
      d: "Sit with the “what’s next” question.",
      hue: T.sparkDeep,
      reg: "spark",
      to: "career",
    },
  ];
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Eyebrow>where do you want to enter</Eyebrow>
      <H>Three doors. One you underneath.</H>
      <P style={{ marginBottom: 26 }}>
        It’s all the same engine. Start wherever feels closest to right now —
        you can move between them anytime.
      </P>
      <div style={{ display: "grid", gap: 14 }}>
        {doors.map((x) => (
          <button
            key={x.k}
            onClick={() => go(x.to)}
            style={{
              textAlign: "left",
              background: T.paper,
              border: "none",
              borderRadius: 22,
              padding: "20px 20px",
              cursor: "pointer",
              borderLeft: `5px solid ${x.hue}`,
              boxShadow: "0 6px 20px rgba(28,43,45,.06)",
            }}
          >
            <div
              style={{
                fontFamily: FONT_DISPLAY,
                fontSize: 21,
                fontWeight: 500,
                color: T.ink,
              }}
            >
              {x.k}
            </div>
            <div style={{ fontSize: 14, color: T.inkSoft, marginTop: 4 }}>
              {x.d}
            </div>
          </button>
        ))}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 20 }}>
        <Btn variant="quiet" onClick={() => go("home")}>
          Skip to my space
        </Btn>
      </div>
    </div>
  );
}

/* ---------------- MindSpace check-in ---------------- */
function Checkin({ go, feeling, setFeeling }) {
  const moods = [
    ["🌫️", "Foggy"],
    ["🌊", "Restless"],
    ["🪨", "Heavy"],
    ["🌤️", "Okay"],
    ["☀️", "Light"],
  ];
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Eyebrow>mindspace · daily</Eyebrow>
      <H>How’s the weather in there today?</H>
      <P>No right answer. Just the closest one.</P>
      <div style={{ display: "grid", gap: 10, marginTop: 10 }}>
        {moods.map(([e, m]) => (
          <button
            key={m}
            onClick={() => setFeeling(m)}
            style={{
              display: "flex",
              alignItems: "center",
              gap: 14,
              background: feeling === m ? T.sage : T.paper,
              color: feeling === m ? T.paper : T.ink,
              border: "none",
              borderRadius: 18,
              padding: "16px 18px",
              cursor: "pointer",
              fontFamily: FONT_BODY,
              fontSize: 17,
              fontWeight: 500,
              transition: "background .2s ease",
            }}
          >
            <span style={{ fontSize: 24 }}>{e}</span>
            {m}
          </button>
        ))}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 22 }}>
        <Btn onClick={() => go("listen")} disabled={!feeling}>
          {feeling ? "Continue" : "Pick one to continue"}
        </Btn>
      </div>
    </div>
  );
}

/* ---------------- Listening layer (open prompt) ---------------- */
function Listen({ go, thought, setThought }) {
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Eyebrow>say it however it comes out</Eyebrow>
      <H>What’s on your mind today?</H>
      <P>
        You don’t have to make it neat. Type it the way you’d say it to someone
        who won’t judge.
      </P>
      <textarea
        value={thought}
        onChange={(e) => setThought(e.target.value)}
        placeholder="Everyone’s deciding their future and I just feel stuck. What if I pick wrong…"
        style={{
          flex: 1,
          minHeight: 200,
          background: T.paper,
          border: "none",
          borderRadius: 20,
          padding: 18,
          fontFamily: FONT_BODY,
          fontSize: 16,
          lineHeight: 1.5,
          color: T.ink,
          resize: "none",
          outline: "none",
        }}
      />
      <div style={{ marginTop: 16, display: "grid", gap: 10 }}>
        <Btn onClick={() => go("formulating")}>Continue</Btn>
        <div
          style={{
            fontSize: 12.5,
            color: T.inkSoft,
            textAlign: "center",
            lineHeight: 1.4,
          }}
        >
          We read for what’s driving the feeling — not to file you into a box.
        </div>
      </div>
    </div>
  );
}

/* ---------------- Formulating (engine working) ---------------- */
function Formulating({ go }) {
  useEffect(() => {
    const t = setTimeout(() => go("triage"), 2200);
    return () => clearTimeout(t);
  }, []);
  return (
    <div
      style={{
        flex: 1,
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        justifyContent: "center",
        textAlign: "center",
      }}
    >
      <div className="breathe">
        <Arc progress={0.33} register="calm" label="" size={130} />
      </div>
      <H size={24} style={{ marginTop: 30 }}>
        Sitting with what you wrote…
      </H>
      <div style={{ display: "grid", gap: 8, marginTop: 6 }}>
        {["Listening", "Finding the real driver", "Choosing how to help"].map(
          (s, i) => (
            <div
              key={s}
              className="pulse"
              style={{
                fontSize: 14,
                color: T.inkSoft,
                animationDelay: `${i * 0.4}s`,
              }}
            >
              {s}
            </div>
          )
        )}
      </div>
    </div>
  );
}

/* ---------------- Triage result + the hard crisis branch ---------------- */
function Triage({ go }) {
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Eyebrow>what we noticed</Eyebrow>
      <H>This reads less like indecision, more like fear of getting it wrong.</H>
      <div
        style={{
          background: T.paper,
          borderRadius: 20,
          padding: 20,
          marginBottom: 18,
        }}
      >
        <Tag>Catastrophizing</Tag>
        <Tag>Values conflict</Tag>
        <P style={{ margin: "12px 0 0", color: T.ink }}>
          The “what if I pick wrong” loop is doing most of the work here. We’ll
          loosen that first, then look at what actually matters to you.
        </P>
      </div>
      <P style={{ fontSize: 13.5 }}>
        That’s a guess, not a verdict — you can tell us if it’s off.
      </P>
      <div style={{ marginTop: "auto", display: "grid", gap: 10 }}>
        <Btn onClick={() => go("reframe")}>That fits — let’s work on it</Btn>
        <Btn variant="ghost" onClick={() => go("listen")}>
          Not quite, let me say more
        </Btn>
        <button
          onClick={() => go("crisis")}
          style={{
            background: "none",
            border: "none",
            cursor: "pointer",
            fontFamily: FONT_BODY,
            fontSize: 13,
            color: T.alert,
            fontWeight: 600,
            padding: 8,
          }}
        >
          I’m not safe right now →
        </button>
      </div>
    </div>
  );
}
const Tag = ({ children }) => (
  <span
    style={{
      display: "inline-block",
      background: T.mist,
      color: T.sageDeep,
      fontFamily: FONT_BODY,
      fontSize: 13,
      fontWeight: 600,
      borderRadius: 999,
      padding: "6px 12px",
      marginRight: 8,
    }}
  >
    {children}
  </span>
);

/* ---------------- Reframe module ---------------- */
function Reframe({ go, counter, setCounter }) {
  const [picked, setPicked] = useState(null);
  const options = [
    "There’s no wrong choice — only a first one I can adjust.",
    "Most people change direction. A start isn’t a sentence.",
    "I can’t know it’s wrong until I’ve actually tried something.",
  ];
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Eyebrow>reframe</Eyebrow>
      <H>The thought, held up to the light.</H>
      <div
        style={{
          background: "#F0DAD2",
          borderRadius: 18,
          padding: "14px 16px",
          marginBottom: 18,
          fontFamily: FONT_DISPLAY,
          fontStyle: "italic",
          fontSize: 16,
          color: T.ink,
        }}
      >
        “What if I pick wrong and ruin everything?”
      </div>
      <P>Which of these feels truer when you actually read it slowly?</P>
      <div style={{ display: "grid", gap: 10 }}>
        {options.map((o) => (
          <button
            key={o}
            onClick={() => setPicked(o)}
            style={{
              textAlign: "left",
              background: picked === o ? T.sage : T.paper,
              color: picked === o ? T.paper : T.ink,
              border: "none",
              borderRadius: 16,
              padding: "15px 16px",
              cursor: "pointer",
              fontFamily: FONT_BODY,
              fontSize: 15,
              lineHeight: 1.4,
              transition: "background .2s ease",
            }}
          >
            {o}
          </button>
        ))}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 20 }}>
        <Btn
          onClick={() => {
            setCounter((c) => c + 1);
            go("values");
          }}
          disabled={!picked}
        >
          {picked ? "Keep going" : "Choose one to continue"}
        </Btn>
      </div>
    </div>
  );
}

/* ---------------- Values clarification (ACT) ---------------- */
function Values({ go }) {
  const [sel, setSel] = useState([]);
  const vals = [
    "Building things",
    "Independence",
    "Helping people",
    "Recognition",
    "Stability",
    "Learning",
    "Creativity",
    "Family expectation",
  ];
  const toggle = (v) =>
    setSel((s) => (s.includes(v) ? s.filter((x) => x !== v) : [...s, v]));
  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <Eyebrow>values · what actually matters</Eyebrow>
      <H>Pick what pulls you — ignore what should.</H>
      <P>Choose three. Later we’ll notice which ones are yours vs. inherited.</P>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
        {vals.map((v) => (
          <button
            key={v}
            onClick={() => toggle(v)}
            style={{
              background: sel.includes(v) ? T.sageDeep : T.paper,
              color: sel.includes(v) ? T.paper : T.ink,
              border: "none",
              borderRadius: 999,
              padding: "11px 16px",
              cursor: "pointer",
              fontFamily: FONT_BODY,
              fontSize: 14.5,
              fontWeight: 500,
              transition: "background .2s ease",
            }}
          >
            {v}
          </button>
        ))}
      </div>
      <div
        style={{
          marginTop: 20,
          background: "#F0DAD2",
          borderRadius: 16,
          padding: "14px 16px",
          fontSize: 13.5,
          color: T.ink,
          lineHeight: 1.45,
        }}
      >
        {sel.includes("Family expectation") && sel.length > 1
          ? "Worth noticing: one of these might be someone else’s voice. We’ll separate that out in SelfQuest."
          : "Good. Hold these loosely — they’re a starting read, not a label."}
      </div>
      <div style={{ marginTop: "auto", paddingTop: 18 }}>
        <Btn onClick={() => go("selfquest_intro")} disabled={sel.length < 1}>
          See this as a fuller picture
        </Btn>
      </div>
    </div>
  );
}
